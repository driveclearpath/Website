[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/validate-invite"
  to = "/.netlify/functions/validate-invite"
  status = 200

[[redirects]]
  from = "/api/chat-turn"
  to = "/.netlify/functions/chat-turn"
  status = 200

[[redirects]]
  from = "/api/submit-intake"
  to = "/.netlify/functions/submit-intake"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/intake.html"
  status = 200

# ClearPath Voice was folded into OS and Practice as a capability,
# rather than a standalone marketed product. Redirect any inbound
# traffic for /voice or /voice.html (search results, old links,
# legacy internal links) over to /os.html.
[[redirects]]
  from = "/voice.html"
  to = "/os.html"
  status = 301
  force = true

[[redirects]]
  from = "/voice"
  to = "/os.html"
  status = 301
  force = true
