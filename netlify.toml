[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Weekly intake digest — Mondays 12:00 UTC (~8am ET)
[functions."intake-digest"]
  schedule = "0 12 * * 1"

# Security headers. CSP allowances: Google Fonts (all pages), Cloudflare Turnstile
# (intake-public), Leaflet from unpkg + ArcGIS tiles (events.html vendor map),
# data:/blob: images (intake screenshot previews). Inline scripts/styles are used
# throughout the static pages, hence 'unsafe-inline'.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://server.arcgisonline.com https://unpkg.com; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

[[redirects]]
  from = "/api/validate-invite"
  to = "/.netlify/functions/validate-invite"
  status = 200

[[redirects]]
  from = "/api/chat-turn"
  to = "/.netlify/functions/chat-turn"
  status = 200

[[redirects]]
  from = "/api/submit-intake"
  to = "/.netlify/functions/submit-intake"
  status = 200

# Public "Talk to Brad" intake (driveclearpath.com /contact.html → /intake-public.html)
[[redirects]]
  from = "/api/public-validate-entry"
  to = "/.netlify/functions/public-validate-entry"
  status = 200

[[redirects]]
  from = "/api/public-chat-turn"
  to = "/.netlify/functions/public-chat-turn"
  status = 200

[[redirects]]
  from = "/api/public-submit-intake"
  to = "/.netlify/functions/public-submit-intake"
  status = 200

[[redirects]]
  from = "/api/confirm-intake"
  to = "/.netlify/functions/confirm-intake"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/intake.html"
  status = 200

[[redirects]]
  from = "/talk"
  to = "/intake-public.html"
  status = 200

[[redirects]]
  from = "/intake-public"
  to = "/intake-public.html"
  status = 200

# Block the intake-public/ spec folder from public access. These are internal-only
# (objectives, system prompt, setup notes) — not secrets, but no reason to publish them.
[[redirects]]
  from = "/intake-public/*"
  to = "/404.html"
  status = 404
  force = true

# ClearPath Voice was folded into OS and Practice as a capability,
# rather than a standalone marketed product. Redirect any inbound
# traffic for /voice or /voice.html (search results, old links,
# legacy internal links) over to /os.html.
[[redirects]]
  from = "/voice.html"
  to = "/os.html"
  status = 301
  force = true

[[redirects]]
  from = "/voice"
  to = "/os.html"
  status = 301
  force = true
